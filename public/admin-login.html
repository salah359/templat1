<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9; /* Light grey background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Soft shadow */
        }
        .brand-logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">Manager Access</div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-muted">Password</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter Admin Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Login</button>
            <div id="errorMsg" class="text-danger text-center mt-3 small d-none">
                <i class="bi bi-exclamation-circle"></i> Incorrect Password
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Check if already logged in when page loads
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/check-auth');
                if (res.ok) window.location.href = '/admin'; // Redirect to dashboard if logged in
            } catch (e) { console.log("Not logged in"); }
        });

        // Handle Login Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = e.target.querySelector('button');

            // 1. Show Loading State
            btn.disabled = true;
            btn.innerText = "Verifying...";
            errorMsg.classList.add('d-none');

            try {
                // 2. Send Password to Server
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    // 3. Success: Go to Dashboard
                    window.location.href = '/admin';
                } else {
                    // 4. Fail: Show Error
                    errorMsg.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerText = "Login";
                }
            } catch (err) {
                console.error(err);
                alert("Server Connection Error. Check if node server.js is running.");
                btn.disabled = false;
                btn.innerText = "Login";
            }
        });
    </script>

</body>
</html>
